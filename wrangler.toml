name = "zanflow"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Serve the built React frontend as static assets.
# The Worker handles /api/* routes; everything else is served from the dist/ folder.
# Run `npm run build` before deploying to ensure the assets are up to date.
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Nightly cron: hard-delete draft applications that have passed their expiry date.
# Runs at 02:00 UTC every day.
[triggers]
crons = ["0 2 * * *"]

# Secrets — set via CLI, never commit real values:
#   npx wrangler secret put DATABASE_URL
#   npx wrangler secret put JWT_SECRET
#
# For local dev, create a .dev.vars file (git-ignored):
#   DATABASE_URL=postgres://...
#   JWT_SECRET=some-long-random-string
